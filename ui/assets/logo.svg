  <!-- Anillo interior: Inteligencia y neuroforja -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#0c7a5c" stroke-width="4" stroke-dasharray="0" />
  
  <!-- Letra G estilizada y clara -->
  <path d="
    M 75,60 
    h 30 
    a 25,25 0 1 1 0,50 
    a 25,25 0 1 1 0,-50 
